<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="img/varzea-simulator.png">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/index.css">
    <title>Várzea Simulator</title>
</head>
<body onload="carregarTimes()">
    <button class="btnCanto" id="btnAbrirMenu" onclick="abrirMenu()"><i class="fa-solid fa-bars"></i></button>
    <menu>
        <button class="btnMenu" onclick="irParaPagina('index.html')"><i class="fa-solid fa-users"></i> Times</button>
        <button class="btnMenu" onclick="irParaPagina('partida.html')"><i class="fa-solid fa-futbol"></i> Jogar</button>
        <button class="btnMenu" onclick="irParaPagina('configuracoes.html')"><i class="fa-solid fa-gear"></i> Configurações</button>
        <button class="btnMenu" onclick="fecharMenu()"><i class="fa-solid fa-reply"></i> Fechar</button>
    </menu>
    
    <main>
        <div id="botoesMain">
            <button class="btnMain" id="criarTimeBtn" onclick="abrirJanela('formulario')"><i class="fa-solid fa-plus"></i> Criar Time</button>
            <button class="btnMain" onclick="abrirJanela('transferencia')"><i class="fa-solid fa-arrow-right-arrow-left"></i> Transferir Jogador</button>
        </div>
        <div id="timesDiv">
            
        </div>
    </main>
    <div id="janela-modal">
        <div id="formularioDiv" class="divJanela">
            <button onclick="fecharJanela('formulario')" class="btnSairJanela"><i class="fa-solid fa-x" aria-hidden="true"></i></button>
            <div id="nomeTimeDiv">
                <label for="nomeTime-formulario">Nome</label>
                <input type="text" id="nomeTime-formulario" placeholder="Nome do time">
            </div>
            <button onclick="fecharJanela('formulario')" class="btnSairJanela"><i class="fa-solid fa-x" aria-hidden="true"></i></button>
            <div id="coresDiv">
                <div id="cor1Div">
                    <label for="cor1-formulario">Cor 1</label>
                    <input type="color" id="cor1-formulario">
                </div>
                <div id="cor2Div">
                    <label for="cor2-formulario">Cor 2</label>
                    <input type="color" id="cor2-formulario">
                </div>
            </div>
            <table id="jogadoresTabela">
                <thead>
                    <th id="posicaoTh">Posição</th>
                    <th id="nomeTh">Nome</th>
                    <th id="overTh">Over</th>
                </thead>
                <tr>
                    <td><select name="posicaoSelect" class="posicaoSelect">
                        <option value="GK">Goleiro</option>
                    </select></td>
                    <td>
                        <input type="text" name="nomePlayer" class="nomePlayer" placeholder="Nome Goleiro">
                    </td>
                    <td>
                        <input type="number" name="overPlayer" class="overPlayer">
                    </td>
                </tr>
                <tr>
                    <td><select name="posicaoSelect" class="posicaoSelect">
                        <option value="nenhuma">Selecione a Posição</option>
                        <option value="ZG">Zagueiro</option>
                        <option value="MC">Meio-Campo</option>
                        <option value="AT">Atacante</option>
                    </select></td>
                    <td>
                        <input type="text" name="nomePlayer" class="nomePlayer" placeholder="Nome Player 1">
                    </td>
                    <td>
                        <input type="number" name="overPlayer" class="overPlayer">
                    </td>
                </tr>
                <tr>
                    <td><select name="posicaoSelect" class="posicaoSelect">
                        <option value="nenhuma">Selecione a Posição</option>
                        <option value="ZG">Zagueiro</option>
                        <option value="MC">Meio-Campo</option>
                        <option value="AT">Atacante</option>
                    </select></td>
                    <td>
                        <input type="text" name="nomePlayer" class="nomePlayer" placeholder="Nome Player 2">
                    </td>
                    <td>
                        <input type="number" name="overPlayer" class="overPlayer">
                    </td>
                </tr>
                <tr>
                    <td><select name="posicaoSelect" class="posicaoSelect">
                        <option value="nenhuma">Selecione a Posição</option>
                        <option value="ZG">Zagueiro</option>
                        <option value="MC">Meio-Campo</option>
                        <option value="AT">Atacante</option>
                    </select></td>
                    <td>
                        <input type="text" name="nomePlayer" class="nomePlayer" placeholder="Nome Player 3">
                    </td>
                    <td>
                        <input type="number" name="overPlayer" class="overPlayer">
                    </td>
                </tr>
                <tr>
                    <td><select name="posicaoSelect" class="posicaoSelect">
                        <option value="nenhuma">Selecione a Posição</option>
                        <option value="ZG">Zagueiro</option>
                        <option value="MC">Meio-Campo</option>
                        <option value="AT">Atacante</option>
                    </select></td>
                    <td>
                        <input type="text" name="nomePlayer" class="nomePlayer" placeholder="Nome Player 4">
                    </td>
                    <td>
                        <input type="number" name="overPlayer" class="overPlayer">
                    </td>
                </tr>
                <tr>
                    <td><select name="posicaoSelect" class="posicaoSelect">
                        <option value="nenhuma">Selecione a Posição</option>
                        <option value="ZG">Zagueiro</option>
                        <option value="MC">Meio-Campo</option>
                        <option value="AT">Atacante</option>
                    </select></td>
                    <td>
                        <input type="text" name="nomePlayer" class="nomePlayer" placeholder="Nome Player 5">
                    </td>
                    <td>
                        <input type="number" name="overPlayer" class="overPlayer">
                    </td>
                </tr>
            </table>
            <button id="btnConfirmar-formulario" onclick="registrarTime()">Confirmar</button>
        </div>
        <div id="transferenciaDiv" class="divJanela">
            <button onclick="fecharJanela('transferencia')" class="btnSairJanela"><i class="fa-solid fa-x" aria-hidden="true"></i></button>
            <h2>Transferir Jogador</h2>
            <div class="transferPai" id="transferencia-timesDiv">
                <div class="transferFilho" id="transferencia-time1Div">
                    <label for="transferencia-time1">Time 1</label>
                    <select name="transferencia-time1" id="transferencia-time1" onchange="carregarJogadoresSelect('#transferencia-time1', '#transferencia-jogador1')">
                        <option>Selecione o Time</option>
                    </select>
                </div>
                <div class="transferFilho" id="transferencia-time2Div">
                    <label for="transferencia-time2">Time 2</label>
                    <select name="transferencia-time2" id="transferencia-time2" onchange="carregarJogadoresSelect('#transferencia-time2', '#transferencia-jogador2')">
                        <option>Selecione o Time</option>
                    </select>
                </div>
            </div>
            <div class="transferPai" id="transferencia-jogadoresDiv">
                <div class="transferFilho" id="transferencia-jogador1Div">
                    <label for="transferencia-jogador1">Jogador 1</label>
                    <select name="transferencia-jogador1" id="transferencia-jogador1">
                        <option value="nenhum">Selecione o Jogador</option>
                    </select>
                </div>
                <div class="transferFilho" id="transferencia-jogador2Div">
                    <label for="transferencia-jogador2">Jogador 2</label>
                    <select name="transferencia-jogador2" id="transferencia-jogador2">
                        <option value="nenhum">Selecione o Jogador</option>
                    </select>
                </div>

            </div>
            <button id="btnTransferir" onclick="transferirJogador()">Transferir</button>
        </div>
    </div>
    
    <script src="js/app.js"></script>
    <script src="https://kit.fontawesome.com/3802d20ec1.js" crossorigin="anonymous"></script>
    <script>
        window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
